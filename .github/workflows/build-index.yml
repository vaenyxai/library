name: Build index

# Rebuild index.json whenever catalogue content changes, commit it back, then
# assemble dist/ and deploy it to Cloudflare Pages (vaenyx-lib.pages.dev) so a
# published Method/Routine reaches the store automatically. The paths filter
# excludes index.json itself (plus [skip ci]) so the commit cannot re-trigger this.
# Linux-only, short timeout, cancel superseded runs.
on:
  push:
    branches: [main]
    paths:
      - "methods/**"
      - "routines/**"
      - "scripts/build-index.mjs"
      - "scripts/build-site.mjs"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-index
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node scripts/build-index.mjs
      - name: Commit index.json
        run: |
          git config user.name "vaenyx-lib-bot"
          git config user.email "vaenyx-lib-bot@users.noreply.github.com"
          git add index.json
          if git diff --cached --quiet; then
            echo "index.json unchanged"
          else
            git commit -m "chore: rebuild index.json [skip ci]"
            git push
          fi
      - name: Assemble dist
        run: node scripts/build-site.mjs
      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy dist --project-name=vaenyx-lib --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}